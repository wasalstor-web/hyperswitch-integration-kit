name: Web CI
on:
  push:
    paths: ["web/**","prisma/**","package.json","package-lock.json","scripts/**",".github/workflows/**",".gitignore","LICENSE","THIRD_PARTY_NOTICES.md","docs/**","README.md",".env.example",".env.docker.example","supabase/migrations/**","supabase/functions/**","server/**","docker/**","docker-compose.yml","docker-compose.dev.yml"]
  pull_request:
    paths: ["web/**","prisma/**","package.json","package-lock.json","scripts/**",".github/workflows/**",".gitignore","LICENSE","THIRD_PARTY_NOTICES.md","docs/**","README.md",".env.example",".env.docker.example","supabase/migrations/**","supabase/functions/**","server/**","docker/**","docker-compose.yml","docker-compose.dev.yml"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
      - run: npm ci
      - name: Prisma generate
        run: npx prisma generate
      - name: Prisma validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: npx prisma validate
      - run: npx tsc -p server/tsconfig.json
      - run: npm run server:build
      - run: npm test
      - run: docker build -f docker/Dockerfile.api -t hs-kit-api:ci .
      - name: THIRD_PARTY_NOTICES sync
        run: npm run licenses:notices && git diff --exit-code THIRD_PARTY_NOTICES.md
      - name: Publish readiness
        shell: pwsh
        run: ./scripts/verify-publish-ready.ps1 -SkipBuild
      - name: Web build
        working-directory: web
        env:
          VITE_SUPABASE_URL: https://YOUR_PROJECT.supabase.co
          VITE_SUPABASE_ANON_KEY: ""
        run: npm ci && npm run build
      - name: Scan dist
        shell: pwsh
        run: ./scripts/verify-publish-ready.ps1 -ScanDistOnly
      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-spa-dist
          path: web/dist/
          if-no-files-found: error
