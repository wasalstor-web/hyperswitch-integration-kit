name: Web CI

on:
  push:
    paths:
      - "web/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/**"
      - ".gitignore"
      - "LICENSE"
      - "THIRD_PARTY_NOTICES.md"
      - "docs/**"
      - "README.md"
      - ".env.example"
      - "supabase/migrations/**"
      - "server/**"
      - "docker-compose.dev.yml"
  pull_request:
    paths:
      - "web/**"
      - "prisma/**"
      - "package.json"
      - "package-lock.json"
      - "scripts/**"
      - ".github/workflows/**"
      - ".gitignore"
      - "LICENSE"
      - "THIRD_PARTY_NOTICES.md"
      - "docs/**"
      - "README.md"
      - ".env.example"
      - "supabase/migrations/**"
      - "server/**"
      - "docker-compose.dev.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - name: Install root (Prisma)
        run: npm ci

      - name: Prisma schema validate
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: npx prisma validate

      - name: Server TypeScript check
        run: npx tsc -p server/tsconfig.json

      - name: THIRD_PARTY_NOTICES in sync with lockfiles
        run: |
          npm run licenses:notices
          git diff --exit-code THIRD_PARTY_NOTICES.md || (
            echo "::error::THIRD_PARTY_NOTICES.md is out of date. Run: npm run licenses:notices && git add THIRD_PARTY_NOTICES.md"
            exit 1
          )

      - name: Publish readiness (no build)
        shell: pwsh
        run: ./scripts/verify-publish-ready.ps1 -SkipBuild

      - name: Install and build SPA
        working-directory: web
        env:
          VITE_SUPABASE_URL: https://YOUR_PROJECT.supabase.co
          VITE_SUPABASE_ANON_KEY: ""
        run: |
          npm ci
          npm run build

      - name: Scan dist for obvious leaks
        shell: pwsh
        run: ./scripts/verify-publish-ready.ps1 -ScanDistOnly

      - uses: actions/upload-artifact@v4
        with:
          name: onboarding-spa-dist
          path: web/dist/
          if-no-files-found: error
